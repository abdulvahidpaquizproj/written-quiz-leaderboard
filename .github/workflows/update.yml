name: Update Dashboard from Google Sheets

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Set up Google Sheets credentials
        run: echo '${{ secrets.SHEETS_KEY_JSON }}' > sheets-key.json
      
      - name: Run dashboard update script
        run: python update_dashboard.py
        env:
          SHEETS_KEY_FILE: sheets-key.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add written_quiz_dashboard.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update dashboard from Google Sheets" && git push)
      
      - name: Clean up credentials
        if: always()
        run: rm -f sheets-key.json
